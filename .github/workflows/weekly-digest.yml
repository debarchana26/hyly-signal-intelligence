name: Weekly Product Digest

on:
  schedule:
    - cron: '0 10 * * 1'  # 10:00 UTC Monday (after daily ingest at 09:00)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run weekly digest
        run: |
          claude --print --dangerously-skip-permissions \
            "Compile the weekly product digest. Read all files in themes/, filter occurrences from the past 7 days, include only signal_type feature-gap/limit/expectation, build and post the weekly digest card to product_digest_feed, save to digests/YYYY-WW.md, note any themes that crossed a promotion threshold this week."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCHAT_WEBHOOK: ${{ secrets.GCHAT_WEBHOOK }}

      - name: Commit digest
        run: |
          git config --local user.email "signal-pipeline@hyly.ai"
          git config --local user.name "Signal Pipeline"
          git add digests/
          git diff --staged --quiet || git commit -m "digest: week $(date +%Y-%W)"
          git push
