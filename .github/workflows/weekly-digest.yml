name: Weekly Product Digest

on:
  schedule:
    - cron: '0 10 * * 1'  # 10:00 UTC Monday (after daily ingest at 09:00)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile and post weekly digest
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mcp_config: |
            {
              "mcpServers": {
                "notion": {
                  "command": "npx",
                  "args": ["-y", "@notionhq/notion-mcp-server"],
                  "env": {
                    "NOTION_API_TOKEN": "${{ secrets.NOTION_TOKEN }}"
                  }
                }
              }
            }
          prompt: |
            Compile the weekly product digest.
            1. Read all files in themes/ directory
            2. Filter occurrences from the past 7 days
            3. Include only signal_type: gap, limit, expectation
            4. Build and post the weekly digest card to product_digest_feed
            5. Save to digests/YYYY-WW.md
            6. Note any themes that crossed a promotion threshold this week
        env:
          GCHAT_WEBHOOK: ${{ secrets.GCHAT_WEBHOOK }}

      - name: Commit digest
        run: |
          git config --local user.email "signal-pipeline@hyly.ai"
          git config --local user.name "Signal Pipeline"
          git add digests/
          git diff --staged --quiet || git commit -m "digest: week $(date +%Y-%W)"
          git push
