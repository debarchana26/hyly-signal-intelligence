name: Weekly Product Digest

on:
  schedule:
    - cron: '0 10 * * 1'  # 10:00 UTC Monday (after daily ingest at 09:00)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile and post weekly digest
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Compile the weekly product digest.

            1. Read all files in themes/ directory
            2. Filter occurrences from the past 7 days (check Occurrences table dates)
            3. Include only signals with signal_type: gap, limit, expectation
            4. Build the weekly digest card in this format:

            📊 Product Signal Digest — Week of [Mon YYYY-MM-DD]
            | Theme | Type | Client | Date | Quote | MRR | Severity |
            Total: [N] signals across [N] clients. Critical alerts sent: [N]

            5. Post to product_digest_feed webhook (TEST_MODE check: read from skill/km-signal-pipeline.md)
            6. Save digest to digests/YYYY-WW.md
            7. Note any themes that crossed a promotion threshold this week (candidate→emerging, emerging→theme)
          allowed_tools: "Bash,Read,Write"
        env:
          GCHAT_WEBHOOK: ${{ secrets.GCHAT_WEBHOOK }}

      - name: Commit digest
        run: |
          git config --local user.email "signal-pipeline@hyly.ai"
          git config --local user.name "Signal Pipeline"
          git add digests/
          git diff --staged --quiet || git commit -m "digest: week $(date +%Y-%W)"
          git push
