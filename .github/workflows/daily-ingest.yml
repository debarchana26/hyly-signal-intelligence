name: Daily Signal Ingest

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: 'Date to process (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        type: string
      client_filter:
        description: 'Process only this client name (optional — leave blank for all)'
        required: false
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure MCP servers
        run: |
          claude mcp add notion \
            -e OPENAPI_MCP_HEADERS="{\"Authorization\": \"Bearer $NOTION_TOKEN\", \"Notion-Version\": \"2022-06-28\"}" \
            -- npx -y @notionhq/notion-mcp-server

          echo "$GDRIVE_CREDENTIALS_JSON" > /tmp/gdrive_credentials.json
          echo "$GDRIVE_TOKEN_JSON" > /tmp/gdrive_token.json

          claude mcp add gdrive \
            -e GDRIVE_CREDENTIALS_FILE=/tmp/gdrive_credentials.json \
            -e GDRIVE_TOKEN_FILE=/tmp/gdrive_token.json \
            -- npx -y @modelcontextprotocol/server-gdrive

          claude mcp list
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}

      - name: Run signal pipeline
        run: |
          PROMPT="Run the km-signal-pipeline skill."
          [ -n "$DATE_RANGE" ] && PROMPT="$PROMPT Date range: $DATE_RANGE."
          [ -n "$CLIENT_FILTER" ] && PROMPT="$PROMPT Client filter: $CLIENT_FILTER."
          claude --print --dangerously-skip-permissions "$PROMPT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCHAT_WEBHOOK: ${{ secrets.GCHAT_WEBHOOK }}
          DATE_RANGE: ${{ inputs.date_range }}
          CLIENT_FILTER: ${{ inputs.client_filter }}

      - name: Commit theme updates
        run: |
          git config --local user.email "signal-pipeline@hyly.ai"
          git config --local user.name "Signal Pipeline"
          git add themes/ digests/
          git diff --staged --quiet || git commit -m "signal: $(date +%Y-%m-%d) ingest"
          git push
